<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Ranchito - Pedidos</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 420px;
  margin: auto;
  padding: 10px;
  background-color: #fff8f0;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
}

.header img {
  width: 60px;
  border-radius: 10px;
  margin-right: 10px;
}

.header h2 {
  margin: 0;
}

.header p {
  font-size: 12px;
  margin: 0;
}

input, select {
  width: 100%;
  margin: 6px 0;
  padding: 10px;
  font-size: 16px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* BOTONES */
input[type="button"] {
  width: 100%;
  margin: 6px 0;
  padding: 12px;
  font-size: 16px;
  background-color: #28a745;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

input[type="button"]:hover {
  background-color: #218838;
}

/* PRODUCTOS */
.producto-item {
  margin-bottom: 8px;
  display: flex;
  gap: 6px;
  align-items: center;
}

.cantidad {
  width: 60px;
}

/* Botón de eliminar */
.borrar-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 20px;
  color: #dc3545;
}
.borrar-btn:hover {
  color: #a71d2a;
}

/* TOTAL */
#total {
  font-weight: bold;
  white-space: pre-line;
  text-align: center;
  margin: 10px 0;
}

/* TEXTOS */
.alerta {
  color: red;
  text-align: center;
}

.pago {
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://i.imgur.com/TU_LOGO.png" alt="Logo">
  <div>
    <h2>El Ranchito</h2>
    <p>Donde comer rico no es un mito</p>
  </div>
</div>

<hr>

<p class="alerta">⚠️ Los precios NO incluyen delivery</p>

<input type="text" id="nombre" placeholder="Nombre del cliente *">
<input type="text" id="direccion" placeholder="Dirección *">
<input type="text" id="celular" placeholder="Celular *">

<select id="distrito">
<option value="">Selecciona distrito *</option>
<option value="La Molina">La Molina (S/10)</option>
<option value="Santa Anita">Santa Anita (S/6)</option>
</select>

<h3>Productos:</h3>

<div id="productos">
  <div class="producto-item">
    <select class="producto">
      <option value="">Selecciona producto</option>
      <option value="0">Pan con Chicharron - S/16</option>
      <option value="1">1/4 de chicharron - S/26</option>
      <option value="2">1/2 chicharron - S/51</option>
      <option value="3">1 kilo de chicharron - S/101</option>
      <option value="4">Cafe pasado - S/5</option>
      <option value="5">Te - S/2</option>
      <option value="6">Manzanilla - S/2</option>
      <option value="7">Anis - S/2</option>
      <option value="8">Gaseosa Personal Inka Kola - S/3.5</option>
      <option value="9">Gaseosa Personal Coca Cola - S/3.5</option>
      <option value="10">Guarnicion extra de camote - S/6</option>
      <option value="11">Guarnicion extra de cancha - S/4</option>
      <option value="12">Guarnicion extra de papa - S/6</option>
      <option value="13">Guarnicion extra de ensalada - S/5</option>
      <option value="14">Guarnicion extra de mote - S/4</option>
      <option value="15">Pan solo - S/1</option>
      <option value="16">Guarnicion de aji - S/0.5</option>
      <option value="17">Tamal de Pollo - S/6</option>
      <option value="18">Tamal de Chancho - S/6</option>
    </select>

    <input type="number" class="cantidad" value="1" min="1">

    <button class="borrar-btn" onclick="this.parentElement.remove()">🗑️</button>
  </div>
</div>

<input type="button" value="➕ Agregar otro producto" onclick="agregarProducto()">
<input type="button" value="💰 Calcular total" onclick="calcularTotal()">

<p id="total"></p>

<p class="pago">
💰 Pago por Yape<br>
<strong>989107285</strong><br>
⚠️ Verifica el siguiente nombre antes de pagar:<br>
<strong>Belinda Asorza Porras</strong>
</p>

<input type="button" id="btnPedido" value="📲 Pedir delivery" style="display:none;" onclick="enviarPedido()">

<script>
const listaProductos = [
  {nombre:"Pan con Chicharron", precio:16},
  {nombre:"1/4 de chicharron", precio:26},
  {nombre:"1/2 chicharron", precio:51},
  {nombre:"1 kilo de chicharron", precio:101},
  {nombre:"Cafe pasado", precio:5},
  {nombre:"Te", precio:2},
  {nombre:"Manzanilla", precio:2},
  {nombre:"Anis", precio:2},
  {nombre:"Gaseosa Personal Inka Kola", precio:3.5},
  {nombre:"Gaseosa Personal Coca Cola", precio:3.5},
  {nombre:"Guarnicion extra de camote", precio:6},
  {nombre:"Guarnicion extra de cancha", precio:4},
  {nombre:"Guarnicion extra de papa", precio:6},
  {nombre:"Guarnicion extra de ensalada", precio:5},
  {nombre:"Guarnicion extra de mote", precio:4},
  {nombre:"Pan solo", precio:1},
  {nombre:"Guarnicion de aji", precio:0.5},
  {nombre:"Tamal de Pollo", precio:6},
  {nombre:"Tamal de Chancho", precio:6}
];

function crearSelect() {
  let select = document.createElement("select");
  select.className = "producto";

  let option = document.createElement("option");
  option.value = "";
  option.text = "Selecciona producto";
  select.appendChild(option);

  listaProductos.forEach((p, i) => {
    let op = document.createElement("option");
    op.value = i;
    op.text = `${p.nombre} - S/${p.precio}`;
    select.appendChild(op);
  });

  return select;
}

function agregarProducto() {
  let div = document.createElement("div");
  div.className = "producto-item";

  let select = crearSelect();

  let input = document.createElement("input");
  input.type = "number";
  input.className = "cantidad";
  input.value = 1;
  input.min = 1;

  let btnBorrar = document.createElement("button");
  btnBorrar.className = "borrar-btn";
  btnBorrar.innerHTML = "🗑️";
  btnBorrar.onclick = function() {
    div.remove();
  };

  div.appendChild(select);
  div.appendChild(input);
  div.appendChild(btnBorrar);

  document.getElementById("productos").appendChild(div);
}

function calcularTotal() {
  let productos = document.querySelectorAll(".producto");
  let cantidades = document.querySelectorAll(".cantidad");
  let distrito = document.getElementById("distrito").value;

  let subtotal = 0;
  let hayProducto = false;

  for (let i = 0; i < productos.length; i++) {
    let index = productos[i].value;
    let cantidad = cantidades[i].value;

    if (index !== "") {
      subtotal += listaProductos[index].precio * cantidad;
      hayProducto = true;
    }
  }

  if (!hayProducto) {
    alert("Selecciona al menos un producto");
    return;
  }

  if (!distrito) {
    alert("Selecciona distrito");
    return;
  }

  let delivery = distrito === "La Molina" ? 10 : 6;
  let total = subtotal + delivery;

  document.getElementById("total").innerText =
    "Subtotal: S/" + subtotal.toFixed(2) +
    "\nDelivery: S/" + delivery +
    "\nTotal: S/" + total.toFixed(2);

  document.getElementById("btnPedido").style.display = "block";
}

function enviarPedido() {
  let nombre = document.getElementById("nombre").value;
  let direccion = document.getElementById("direccion").value;
  let celular = document.getElementById("celular").value;
  let distrito = document.getElementById("distrito").value;

  if (!nombre || !direccion || !celular || !distrito) {
    alert("Completa los campos");
    return;
  }

  let totalText = document.getElementById("total").innerText;
  let totalMatch = totalText.match(/Total: S\/(\d+(\.\d+)?)/);
  let total = totalMatch ? totalMatch[1] : "0";

  let productos = document.querySelectorAll(".producto");
  let cantidades = document.querySelectorAll(".cantidad");
  let lista = "";
  for (let i = 0; i < productos.length; i++) {
    let index = productos[i].value;
    let cantidad = cantidades[i].value;
    if (index !== "") {
      let p = listaProductos[index];
      lista += `- ${cantidad} ${p.nombre}\n`;
    }
  }

  let mensaje = `📦 Nuevo pedido

Nombre: ${nombre}
Productos:
${lista}Dirección: ${direccion}
Distrito: ${distrito}
Celular: ${celular}
💰 Monto total a pagar: S/${total}`;

  window.open(`https://wa.me/51987912419?text=${encodeURIComponent(mensaje)}`);
}
</script>

</body>
</html>
